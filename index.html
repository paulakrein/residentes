<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Residentes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Residentes</h1>

    <section class="card">
      <h2>Criar jogador</h2>

      <label for="nomeJogador">Nome do jogador</label>
      <input id="nomeJogador" type="text" placeholder="Digite o nome" />

      <div class="botoes">
        <button id="criarJogador">Criar jogador</button>
        <button id="iniciarJogo" disabled>Iniciar jogo</button>
      </div>
    </section>

    <section id="painelJogo" class="card hidden">
      <div class="topo-jogo">
        <div>
          <h2 id="tituloJogador">Jogador</h2>
          <p>Pontuação: <strong id="pontuacao">0</strong></p>
        </div>
      </div>

      <button id="sortearResidentes">Sortear 3 residentes</button>

      <div id="residentesSorteados" class="grid-cartas"></div>

      <div id="residenteEscolhido" class="escolhido"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
