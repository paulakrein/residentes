<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Residentes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Residentes</h1>

    <section id="telaInicial" class="card">
      <h2>Criar jogador</h2>

      <label for="nomeJogador">Nome do jogador</label>
      <input id="nomeJogador" type="text" placeholder="Digite o nome" />

      <div class="botoes">
        <button id="criarJogador">Criar jogador</button>
        <button id="iniciarJogo" disabled>Iniciar jogo</button>
      </div>
    </section>

    <section id="telaEscolhaResidente" class="card hidden">
      <h2 id="tituloJogador">Jogador</h2>
      <p>Pontuação: <strong id="pontuacaoEscolha">0</strong></p>

      <button id="sortearResidentes">Sortear 3 residentes</button>

      <div id="residentesSorteados" class="grid-cartas"></div>
    </section>

    <section id="telaJogo" class="hidden">
      <section class="card painel-status">
        <div>
          <h2 id="nomeJogadorAtivo">Jogador</h2>
          <p>Pontuação: <strong id="pontuacaoJogo">0</strong></p>
          <p>Energia: <strong id="energiaJogo">7</strong></p>
        </div>

        <div id="residenteAtivo" class="mini-carta"></div>
      </section>

      <section class="card">
        <h2>Setup inicial</h2>

        <div class="botoes">
          <button id="comprarChefes">Comprar 2 chefes</button>
          <button id="comprarTaticas">Comprar 3 cartas táticas</button>
        </div>
      </section>

      <section class="card">
        <h2>Chefes em campo</h2>
        <div id="chefesComprados" class="grid-cartas"></div>
      </section>

      <section class="card">
        <h2>Cartas táticas na mão</h2>
        <div id="taticasCompradas" class="grid-cartas"></div>
      </section>
    </section>

    
      <section class="card">
        <h2>Jogar os dados</h2>

        <div class="simulador-dados">
          <div id="areaDados" class="area-dados">
            <p class="placeholder-dados">Escolha dados e clique em rolar.</p>
          </div>

          <div class="total-dados">
            Total: <strong id="totalDados">0</strong>
          </div>

          <div class="controles-dados">
            <button onclick="adicionarDado(4)">d4</button>
            <button onclick="adicionarDado(6)">d6</button>
            <button onclick="adicionarDado(8)">d8</button>
            <button onclick="rolarDados()">Rolar</button>
            <button onclick="limparDados()">Limpar</button>
          </div>
        </div>
      </section>
      
  </main>

  <script src="script.js"></script>
</body>
</html>
