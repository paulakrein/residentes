<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Residentes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-screen">

  <section class="screen start-screen active" id="startScreen">
    <input id="playerNameInput" class="name-input" placeholder="Qual seu nome?" />
    <button id="startButton" class="start-button" disabled>Sortear Residentes</button>
  </section>

  <section class="screen resident-screen" id="residentScreen">
    <h1>Escolha um dos três<br>residentes abaixo.</h1>

    <div class="resident-options">
      <img class="resident-choice" />
      <img class="resident-choice" />
      <img class="resident-choice" />
    </div>

    <div class="resident-modal" id="residentModal">
      <button class="resident-modal-close" id="residentModalClose">×</button>

      <img class="resident-modal-card" id="residentModalCard" />

      <button class="resident-confirm-button" id="residentConfirmButton">
        ESCOLHER
      </button>
    </div>
  </section>

  <section class="screen board-screen" id="boardScreen">

    <section class="opponent-area">
      <div class="settings-button">⚙</div>

      <div class="opponent-avatar">
        <img id="opponentAvatarImg" />
      </div>

      <div class="opponent-counters">
        <div class="counter-group">

          <div class="counter tiny" id="opponentEnergy">7</div>
          <div class="counter">
            <button class="counter-btn" id="opponentEnergyMinus">−</button>
            <button class="counter-btn" id="opponentEnergyPlus">+</button>
          </div>

        </div>

        <div class="counter-group small-group">

          <div class="counter small" id="opponentScore">0</div>
          <div class="counter">
            <button class="counter-btn small-btn" id="opponentScoreMinus">−</button>
            <button class="counter-btn small-btn" id="opponentScorePlus">+</button>
          </div>

        </div>
      </div>

      <div class="opponent-hand">
        <div class="card tilted t1"></div>
        <div class="card tilted t2"></div>
        <div class="card tilted t3"></div>
        <div class="card tilted t4"></div>
        <div class="card tilted t5"></div>
        <div class="card tilted t6"></div>
      </div>

      <div class="opponent-bosses">
        <img class="boss-card" id="opponentBoss1" />
        <img class="boss-card" id="opponentBoss2" />
      </div>

      <div class="ally-card opponent-ally"></div>
    </section>

    <section class="center-area">
      <div class="boss-slot"></div>
      <div class="modifier-slot"></div>
      
      <div class="deck-zone boss-deck-zone">
        <div class="discard-pile boss-discard"></div>
        <div class="draw-pile boss-draw" id="bossDrawPile">
          <img src="assets/cartas/back/back-chefe.png" />
        </div>
      </div>

      <div class="deck-zone tactic-deck-zone">
        <div class="discard-pile tactic-discard"></div>
        <div class="draw-pile tactic-draw" id="tacticDrawPile"></div>
      </div>
    </section>

    <section class="player-area">
      <div class="player-hand">
        <div class="card fan f1"></div>
        <div class="card fan f2"></div>
        <div class="card fan f3"></div>
        <div class="card fan f4"></div>
        <div class="card fan f5"></div>
        <div class="card fan f6"></div>
      </div>

      <div class="player-bosses">
        <img class="boss-card" id="playerBoss1" />
        <img class="boss-card" id="playerBoss2" />
      </div>

      <div class="ally-card player-ally"></div>

      <div class="player-avatar">
        <img id="playerAvatarImg" />
      </div>

      <div class="player-counters">
        <div class="counter-group">

          <div class="counter tiny" id="playerEnergy">7</div>


          <div class="counter">
            <button class="counter-btn" id="playerEnergyMinus">−</button>
            <button class="counter-btn" id="playerEnergyPlus">+</button>
          </div>
        </div>

        <div class="counter-group small-group">

          <div class="counter small" id="playerScore">0</div>
          <div class="counter">
            <button class="counter-btn small-btn" id="playerScoreMinus">−</button>
            <button class="counter-btn small-btn" id="playerScorePlus">+</button>
          </div>
        </div>
      </div>
    </section>

    <footer class="bottom-bar">
      <button id="startTurnButton" class="turn-button">Iniciar turno</button>
      <span id="playerNameDisplay"></span>
    </footer>

    <div class="card-modal" id="cardModal">
      <button class="card-modal-close" id="cardModalClose">×</button>
      <img class="card-modal-img" id="cardModalImg" />
    </div>

    <div class="battle-modal" id="battleModal">
      <button class="battle-modal-close" id="battleModalClose">×</button>

      <div class="battle-player-avatar">
        <img id="battlePlayerAvatarImg" />
      </div>

      <div class="battle-player-hand" id="battlePlayerHand"></div>
    </div>

  </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
