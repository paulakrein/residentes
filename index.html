<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Residentes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-screen">

    <section class="opponent-area">
      <div class="settings-button">⚙</div>

      <div class="opponent-avatar"></div>

      <div class="opponent-counters">
        <div class="counter">0</div>
        <div class="counter small">0</div>
      </div>

      <div class="opponent-hand">
        <div class="card tilted t1"></div>
        <div class="card tilted t2"></div>
        <div class="card tilted t3"></div>
        <div class="card tilted t4"></div>
        <div class="card tilted t5"></div>
      </div>
    </section>

    <section class="center-area">
      <div class="boss-slot"></div>
      <div class="modifier-slot"></div>
    </section>

    <section class="player-area">
      <div class="player-hand">
        <div class="card fan f1"></div>
        <div class="card fan f2"></div>
        <div class="card fan f3"></div>
        <div class="card fan f4"></div>
        <div class="card fan f5"></div>
        <div class="card fan f6"></div>
      </div>

      <div class="player-avatar"></div>

      <div class="player-counters">
        <div class="counter">0</div>
        <div class="counter small">0</div>
      </div>
    </section>

    <footer class="bottom-bar"></footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
